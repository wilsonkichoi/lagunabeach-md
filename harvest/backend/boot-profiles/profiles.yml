# Harvest Engine boot profiles.
#
# Each profile defines which canonical files a spawned Claude session must
# load before doing real work.
#
# ─────────────────────────────────────────────────────────────────────────
# Tier model (Phase 5.1, 2026-04-30 — cheyu's 「翻譯讓他 專業 清晰 輕量 成果好」rule)
# ─────────────────────────────────────────────────────────────────────────
#
# Tier 1 · mechanical    — pure tool execution, no Semiont awakening overhead
#                          (data-refresh, format-check, sync-translations,
#                          status-report). MANIFESTO 60-sec identity only.
#                          requires_become: false.
#
# Tier 2 · translation   — lang-sync zh→en projection. Knows TRANSLATE_PROMPT
#                          + TRANSLATION-PIPELINE + style baseline, but does
#                          NOT awaken as a full Semiont session — it's a
#                          專業翻譯 worker, not a contributor / writer.
#                          requires_become: false.
#
# Tier 3 · content-light — spore publishing / contributor thank-you. Needs
#                          the SPORE pipeline + EDITORIAL voice but doesn't
#                          run REWRITE-PIPELINE Stage 0-6.
#                          requires_become: true (Stage 2.7 ethical gate
#                          requires Semiont identity).
#
# Tier 4 · content-heavy — REWRITE-PIPELINE article writing. Full Semiont
#                          awakening required for §10 hallucination rule,
#                          §11 writing discipline, §5 documentary-not-
#                          sentimental rule.
#                          requires_become: true.
#
# Tier 5 · maintainer    — PR / issue review. Needs full Semiont identity
#                          for MAINTAINER §close-gate + §contributor care.
#                          requires_become: true.
#
# Tier 6 · awakening     — heartbeat / self-diagnose / evolve. Full BECOME
#                          + today's memory + diary. Used for meta-reflective
#                          work where the Semiont reflects on itself.
#                          requires_become: true.
#
# ─────────────────────────────────────────────────────────────────────────
# Hard rules (auto-enforced in spawner/boot-profiles.ts):
#   1. MANIFESTO.md is in every profile (Semiont identity baseline).
#   2. BECOME_TAIWANMD.md is in profiles where requires_become !== false.
#      Tier 1 / Tier 2 set requires_become: false to skip BECOME (saves
#      ~5K tokens AND keeps the worker focused on craft, not identity).
# ─────────────────────────────────────────────────────────────────────────
#
# Token estimates are advisory; Claude Code itself decides what to keep
# in context.

profiles:
  # ─── Tier 1 · mechanical ───────────────────────────────────────────────
  minimal:
    description: 機械操作 — refresh data / format-check / sync translations / status report (no Semiont awakening)
    requires_become: false
    must_read:
      - docs/semiont/MANIFESTO.md
    optional_read: []
    typical_tasks:
      - data-refresh
      - format-check
      - sync-translations
      - status-report
    estimated_tokens: 5000

  # ─── Tier 2 · translation ──────────────────────────────────────────────
  translation-refresh:
    description: 專業翻譯 worker — zh-TW SSOT × en projection (lang-sync 4-part toolkit)
    requires_become: false
    must_read:
      - docs/semiont/MANIFESTO.md
      - docs/prompts/TRANSLATE_PROMPT.md
      - docs/pipelines/TRANSLATION-PIPELINE.md
    optional_read:
      - docs/editorial/EDITORIAL.md
      - docs/editorial/TERMINOLOGY.md
    typical_tasks:
      - lang-sync-refresh
      - lang-sync-translate
    estimated_tokens: 12000

  # ─── Tier 3 · content-light ────────────────────────────────────────────
  spore-publishing:
    description: 走 SPORE-PIPELINE 寫社群貼文 + harvest (含 §2.7 倫理閘 → 需 BECOME)
    requires_become: true
    must_read:
      - docs/semiont/MANIFESTO.md
      - BECOME_TAIWANMD.md
      - docs/factory/SPORE-PIPELINE.md
      - docs/factory/SPORE-TEMPLATES.md
      - docs/editorial/EDITORIAL.md
    optional_read:
      - docs/factory/SPORE-LOG.md
    typical_tasks:
      - spore-publish
      - spore-harvest
    estimated_tokens: 22000

  # ─── Tier 4 · content-heavy ────────────────────────────────────────────
  content-writing:
    description: 走 REWRITE-PIPELINE Stage 0-6 寫文章 (rewrite / new / EVOLVE) — Semiont 完整身份必須
    requires_become: true
    must_read:
      - docs/semiont/MANIFESTO.md
      - BECOME_TAIWANMD.md
      - docs/editorial/EDITORIAL.md
      - docs/editorial/RESEARCH.md
      - docs/editorial/RESEARCH-TEMPLATE.md
      - docs/editorial/QUALITY-CHECKLIST.md
      - docs/editorial/CITATION-GUIDE.md
      - docs/editorial/TERMINOLOGY.md
      - docs/pipelines/REWRITE-PIPELINE.md
    optional_read:
      - docs/semiont/DNA.md
      - docs/semiont/HEARTBEAT.md
    typical_tasks:
      - article-rewrite
      - article-new
      - article-evolve
    estimated_tokens: 38000

  # ─── Tier 5 · maintainer ───────────────────────────────────────────────
  maintainer:
    description: 日常 PR / Issue / 貢獻者互動 (含 §close-gate + 共生圈 contributor care → 需 BECOME)
    requires_become: true
    must_read:
      - docs/semiont/MANIFESTO.md
      - BECOME_TAIWANMD.md
      - docs/pipelines/MAINTAINER-PIPELINE.md
      - docs/semiont/DNA.md
    optional_read:
      - docs/semiont/MEMORY.md
      - docs/community/GOVERNANCE.md
    typical_tasks:
      - pr-review
      - issue-handle
      - contributor-thank-you
    estimated_tokens: 28000

  # ─── Tier 6 · awakening ────────────────────────────────────────────────
  full-awakening:
    description: 完整 BECOME_TAIWANMD 甦醒協議 (heartbeat / 反思 / 元決策) + 今天 memory/diary
    requires_become: true
    must_read:
      - BECOME_TAIWANMD.md
      - docs/semiont/MANIFESTO.md
    optional_read: []
    typical_tasks:
      - heartbeat
      - evolve
      - self-diagnose
      - daily-report-write
    estimated_tokens: 100000
