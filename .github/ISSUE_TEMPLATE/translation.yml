name: 🌐 Translation Submission
description: Submit a translated article (no Git needed!)
title: "translate(zh-TW): {source article}"
labels: ["translation"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🌐 Translation Submission

        Thanks for helping translate LagunaBeach.md! Paste your translated article below and a maintainer will turn it into a PR.

        > 💡 If you know Git, opening a PR directly is faster to merge.

  - type: dropdown
    id: language
    attributes:
      label: Target Language
      options:
        - 🇹🇼 中文 (zh-TW)
        - Other (please describe below)
    validations:
      required: true

  - type: input
    id: source-article
    attributes:
      label: Source Article
      description: Which English article are you translating?
      placeholder: "e.g. Pageant of the Masters, Tide Pools at Treasure Island"
    validations:
      required: true

  - type: input
    id: file-path
    attributes:
      label: Suggested File Path
      description: "Format: knowledge/{lang}/{Category}/{slug}.md"
      placeholder: "e.g. knowledge/zh-TW/History/art-colony.md"
    validations:
      required: false

  - type: textarea
    id: translation-content
    attributes:
      label: Translation Content
      description: |
        Paste the full .md file content (with frontmatter).
        If you used AI, please read it through once to check quality.
      placeholder: |
        ---
        title: '...'
        description: '...'
        date: 2026-03-23
        tags: [history]
        category: History
        ---

        # ...
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: ai-tool
    attributes:
      label: AI Tool Used
      options:
        - Claude
        - ChatGPT
        - Gemini
        - Copilot
        - Other
        - Human translation (no AI)
    validations:
      required: true

  - type: dropdown
    id: native-speaker
    attributes:
      label: Are you a native speaker?
      options:
        - ✅ Yes
        - ❌ No
        - 🔄 Near-native
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any difficulties or things to watch out for.
    validations:
      required: false
