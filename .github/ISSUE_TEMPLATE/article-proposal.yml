name: 📝 Article Proposal
description: Propose a new article, or submit full article content
title: "[Article] "
labels: ["content"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - History
        - Art & Galleries
        - Nature & Marine Life
        - Food
        - Beaches
        - Trails
        - Events & Festivals
        - Neighborhoods
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: Article Content
      description: |
        This can be a complete article (with frontmatter) or just a topic proposal.
        For the full format, see [CONTRIBUTING.md](https://github.com/wilsonkichoi/lagunabeach-md/blob/main/CONTRIBUTING.md).
      placeholder: |
        ---
        title: "Article Title"
        description: "One-sentence description"
        date: 2026-01-01
        tags: ["tag1", "tag2"]
        ---

        # Article Title

        ## At a glance
        ...
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Please provide verifiable sources.
      placeholder: "- https://example.com/source1\n- Book or article title"
    validations:
      required: false
