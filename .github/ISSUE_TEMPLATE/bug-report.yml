name: 🐛 Bug Report
description: Site functionality problems, display errors, broken links, etc.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the problem you ran into.
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Page URL
      placeholder: "https://lagunabeach.md/..."
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: If you can, please attach a screenshot.
    validations:
      required: false
