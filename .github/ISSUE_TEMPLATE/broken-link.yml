name: 🔗 Broken Link
description: Report a 404 or broken link on the site
title: "404: "
labels: ["bug", "broken-link"]
body:
  - type: input
    id: url
    attributes:
      label: Broken URL
      description: The full URL where you saw the 404.
      placeholder: "https://lagunabeach.md/..."
    validations:
      required: true
  - type: input
    id: referrer
    attributes:
      label: Referrer
      description: Which page did you click through from? (optional)
      placeholder: "https://lagunabeach.md/history"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything that helps us track down the problem.
    validations:
      required: false
