name: 🔍 Fact Correction
description: Point out a factual error or outdated information in an article
title: "[Fact Check] "
labels: ["needs-verification"]
body:
  - type: input
    id: article
    attributes:
      label: Which article?
      description: Article title or URL
      placeholder: "e.g. Pageant of the Masters, or https://lagunabeach.md/history/..."
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What's wrong?
      description: Point to the specific error, and include a source for the correct information.
      placeholder: |
        Incorrect: "X happened in 1990"
        Correct: "X happened in 1993"
        Source: https://...
    validations:
      required: true
