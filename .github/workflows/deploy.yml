name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    # 2026-05-04: ubuntu-latest → ubuntu-24.04-arm. Free for public repos
    # (4 vCPU / 16 GB), and arm64 is reported 1.3-1.7× faster on Node + Sharp
    # workloads. Playwright Chromium binary supports linux/arm64 since 1.40.
    # If perf regresses, revert to ubuntu-latest in a hotfix.
    runs-on: ubuntu-24.04-arm
    # 2026-04-22 β post-mortem: run 24782448133 `npx playwright install --with-deps`
    # silent hang 6 小時才被 default 360 min timeout 殺掉。加上限避免重演。
    # 2026-05-02 γ: 35 → 60 — article volume grew (641 zh × 6 langs ≈ 3800 pages)
    # 加 OG generation，到 2411/2520 才被 35 min timeout 砍。
    # 2026-05-03 cross-lang-baseline: 60 → 120 — PR #797 rename 902 lang files
    # cache miss 全 regen ~4500 OG images = 40 min OG step + 20 min Build = 60 min hit。
    # og-rename-sync.mjs (PR #805) + jpg mtime touch (PR #806) 修補後預期回 ~21 min，
    # 但 timeout cushion 加倍給穩定性緩衝（避免再撞 cache miss 場景 timeout 又 cancel）。
    timeout-minutes: 120
    env:
      # 防 apt-get 互動 prompt（Playwright --with-deps 會呼叫 sudo apt-get）
      DEBIAN_FRONTEND: noninteractive
      # 2026-05-04: bump heap to 12 GB. Default 4 GB has been close to the
      # ceiling at 4,393 pages × 6 langs (max RSS ~3.4 GB observed locally).
      # Headroom prevents GC thrashing as content grows.
      NODE_OPTIONS: --max-old-space-size=12288
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # 把檔案 mtime 從 git log 還原（修「每次 CI 都全量重產 OG」bug）
      # git checkout 會把所有檔案 mtime 設成 checkout 當下，這步讓 mtime 改回
      # 最後 commit 該檔的時間，讓 og:generate 的 mtime incremental 能正確運作
      - name: Restore file mtimes from git history
        uses: chetan/git-restore-mtime-action@v2
      - name: Setup Node (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Tier 1-2: 快取 npm 下載（不是 node_modules 本體）
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: Validate frontmatter (changed files)
        run: node scripts/core/test-frontmatter.mjs --ci

      # SSOT article-health validation — full sweep on CI.
      # Phase 10 promoted from shadow → hard gate. 2026-05-04 cleanup-1-4 promoted
      # CI to hard fail (no observation period needed; pre-commit gate already
      # caught drift, full sweep on main is the final safety net).
      - name: Validate article health (SSOT, full sweep)
        # ci-deploy profile: full sweep, blocks on HARD only. WARN is advisory
        # surface (dashboard + human review). release-pr profile is the strict
        # one for explicit release review (fails on WARN too).
        run: python3 scripts/tools/article-health.py --all --profile=ci-deploy --quiet

      # ── Tier 1-3: Astro content collection parse cache ─────────────────
      # .astro/ 放 Astro 6 的 content collection 解析結果（frontmatter 標準化
      # + schema 驗證）。cache hit 時 Astro build 可以跳過重 parse。
      # 任一 md 改變 → cache miss → Astro 重 parse（而且 hashFiles 會重算 key）
      # 2026-04-28 ε: 同 OG cache 修法 —— 把 *.md 從 key 拿掉，改用 always-save
      # + restore-keys 撿最新快取。Astro content collection cache 是增量的，
      # 內容變動由 .astro/ 內部 hashing 決定，不需要 cache key 跟 md 綁。
      - name: Restore Astro content collection cache
        uses: actions/cache@v4
        with:
          path: .astro
          key: astro-${{ runner.os }}-${{ hashFiles('astro.config.mjs', 'src/content.config.ts', 'src/content/config.ts') }}-${{ github.run_id }}
          restore-keys: |
            astro-${{ runner.os }}-${{ hashFiles('astro.config.mjs', 'src/content.config.ts', 'src/content/config.ts') }}-
            astro-${{ runner.os }}-

      # ── OG 圖片生成（2026-05-03 musing-chaplygin v4 inline-HTML batch）──
      # v4 結構性最佳化：原 v3 為每篇文章開新 page navigation，~17 min / 1731 篇。
      # v4 改為「單頁 frontend + JS 動態替換 + screenshot loop」，~30s / 2754 篇。
      # 不再需要 Astro dev server（v4 inline HTML self-contained）。
      # 視覺保真：favicon embed base64、Noto Serif TC + JP + KR 字體 link、
      # 真實 i18n breadcrumb labels、frontmatter title + description 直讀。
      # Incremental cache key 改 track v4 visual canonical：generate-og-images.mjs
      # + favicon.png（content 變動由 mtime 增量檢查，restore-keys 撿最新快取）。
      - name: Restore OG image cache
        uses: actions/cache@v4
        with:
          path: public/og-images
          key: og-images-${{ hashFiles('scripts/core/generate-og-images.mjs', 'public/favicon.png') }}-${{ github.run_id }}
          restore-keys: |
            og-images-${{ hashFiles('scripts/core/generate-og-images.mjs', 'public/favicon.png') }}-
            og-images-

      # ── Tier 1-1: Playwright chromium binary cache ─────────────────────
      # `npx playwright install chromium` 每次會下載 ~130 MB（~90-120s）。
      # Cache 依 playwright 版本決定 key，版本沒變就直接用。
      #
      # 2026-04-22 β post-mortem（run 24782448133 silent hang）:
      # 原本 `--with-deps` 把 apt-get install 塞在同一步 → 偶發 silent hang。
      # 拆成 install-deps（系統套件、always run、短）+ install chromium
      # （binary、conditional），觀察 log 時能更精確定位問題。
      - name: Restore Playwright cache
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright system deps (always)
        timeout-minutes: 5
        run: npx --no-install playwright install-deps chromium
      - name: Install Playwright Chromium binary
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 5
        run: npx --no-install playwright install chromium
      # 2026-05-03 cross-lang-baseline post-mortem: PR #797 rename 902 lang files
      # 到 en canonical slug (per URL convention 2026-04-12)。OG cache file 用 lang
      # URL slug 為 path → outputPath 變 → 全 cache miss → 重 render ~4500 images
      # = 40 min build slowdown (5/2 build 21 min → 5/3 build 60 min timeout)。
      # Fix: OG generation 前先掃 git log rename history，把對應 cache file 從
      # 舊 slug path mv 到新 slug path。原本要重 render 的 ~900 file 只要 mv 即可。
      - name: Sync OG cache for renamed articles
        timeout-minutes: 2
        run: node scripts/tools/og-rename-sync.mjs --since '30 days ago'
      # OG generation skip optimization (2026-05-03 v4)：detect if any content
      # / template change since last commit; if not, the cache is already correct
      # and we skip Playwright launch entirely. v4 不再依賴 dev server，但 launch
      # Playwright + setContent 仍有 ~1-2s overhead，能省則省。
      - name: Detect OG-relevant changes
        id: og-changes
        run: |
          # v4 visual canonical: scripts/core/generate-og-images.mjs (template inline)
          # + public/favicon.png (embedded base64). md content 變動由 mtime 增量檢查，
          # 不是 cache miss 觸發。
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'knowledge/**/*.md' \
            'docs/semiont/diary/*.md' \
            'scripts/core/generate-og-images.mjs' \
            'public/favicon.png' 2>/dev/null | head -1)
          if [ -n "$CHANGED" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "✓ Content/template change detected — running OG generation"
          else
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "⏭️  No OG-relevant change — skipping Playwright launch"
          fi
      - name: Generate OG images (v4 inline-HTML batch)
        if: steps.og-changes.outputs.needed == 'true'
        # 4-core ubuntu-latest free runner: OG_WORKERS=4 (default) optimal.
        # v4 不需要 dev server（inline HTML self-contained），CI 簡化：
        # 直接跑 npm run og:generate，Playwright 只開 4 個 page，每 page setContent 一次。
        env:
          OG_WORKERS: 4
        run: |
          set -o pipefail
          # 失敗不 block deploy — SEO.astro fallback 會退回預設圖
          npm run og:generate || {
            echo "⚠️  OG generation partial failure — SEO fallback kicks in"
          }

      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
