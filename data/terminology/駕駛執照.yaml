id: 駕駛執照
category: daily
subcategory: 日常生活
fork_type: B
display:
  taiwan: 駕照 / 駕駛執照
  china: 車照
etymology:
  origin: 允許駕駛車輛的證件。台灣正式名稱「駕駛執照」，口語「駕照」。中國稱「駕照」或「車照」。注意：台灣「行車執照」（行照）是車輛登記證，非駕駛證。
  taiwan_path: 台灣用法
  china_path: 中國用法
  fork_point: ""
notes: 行車執照（行照）在台灣指車輛登記文件，與駕駛執照不同。此條目僅指駕駛證。
sources:
  - ThunderKO C2T / 《大陸用語檢索手冊》1997
